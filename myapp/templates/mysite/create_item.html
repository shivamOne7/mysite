<!DOCTYPE html>
<html>
<head>
    <title>Create Item</title>
    <style>
        body {
            font-family: Arial;
            background: #f4f6f8;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .form-container {
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            width: 350px;
        }

        h2 {
            text-align: center;
        }

        input, textarea {
            width: 100%;
            padding: 10px;
            margin-top: 10px;
            border: 1px solid #ccc;
            border-radius: 5px;
        }

        button {
            width: 100%;
            padding: 10px;
            margin-top: 15px;
            background: #3498db;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {
            background: #2980b9;
        }
    </style>
</head>
<body>

<div class="form-container">
    <h2>Create Item</h2>

    <form method="POST">
        {% csrf_token %}

        <input type="text" name="item_name" placeholder="Item Name" required>
        <input type="text" name="item_price" placeholder="Item Price" required>
        <textarea name="item_decs" placeholder="Item Description" required></textarea>

        <button type="submit">Save Item</button>
    </form>
</div>

</body>
</html>
